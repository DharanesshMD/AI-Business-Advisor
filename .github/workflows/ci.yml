name: CI

on:
  push:
    branches: [main, update]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no live API calls)
        run: python -m pytest tests/test_models.py tests/test_chat_helpers.py tests/test_api.py -v --tb=short
        env:
          # Fake keys so Settings() doesn't error — no real API is called in unit tests
          NVIDIA_API_KEY: fake-key
          TAVILY_API_KEY: fake-key
          SONAR_API_KEY: fake-key
          FINNHUB_API_KEY: fake-key

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff check (errors only — no auto-fix)
        run: ruff check backend/ tests/ --select E,F --ignore E501

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-business-advisor:ci .
