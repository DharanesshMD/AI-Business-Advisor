# AI Business Advisor - Docker Compose Configuration
# For local development

services:
  advisor:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SONAR_API_KEY=${SONAR_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - POSTGRES_URI=postgresql://advisor:advisor_password@postgres:5432/ai_advisor
      - REDIS_URI=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=advisor_password
      - DEBUG=true
    volumes:
      # Mount code for development (hot reload)
      - ./backend:/app/backend:ro
      - ./frontend-react:/app/frontend-react:ro
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - neo4j
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=advisor
      - POSTGRES_PASSWORD=advisor_password
      - POSTGRES_DB=ai_advisor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U advisor" ]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/advisor_password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  neo4j_data:
